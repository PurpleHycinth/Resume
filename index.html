<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarali Deshmukh - Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        .pdf-container {
            width: 100vw;
            height: 100vh;
        }

        embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback {
            display: none;
            text-align: center;
            padding: 50px 20px;
            color: white;
        }

        .fallback a {
            color: #4a9eff;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 15px 30px;
            border: 2px solid #4a9eff;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .fallback a:hover {
            background: #4a9eff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <embed src="resume.pdf" type="application/pdf">
    </div>
    
    <div class="fallback">
        <h1>Resume - Swarali Deshmukh</h1>
        <p>Your browser doesn't support embedded PDFs.</p>
        <a href="resume.pdf" download>Download Resume PDF</a>
    </div>
</body>
</html>
