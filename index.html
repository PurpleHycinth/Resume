<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarali's Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8f9fa;
            padding: 20px 10px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            padding: 20px;
            background: #1e3a8a;
            color: white;
            font-size: 1.8rem;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
        .download-btn {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 12px 20px;
            background: #1e3a8a;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }
        .download-btn:hover {
            background: #2e5bb8;
        }
        @media (max-width: 768px) {
            .pdf-container {
                height: 85vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Resume</h1>
        
        <!-- This displays the PDF directly in the browser -->
        <embed 
            src="resume.pdf" 
            type="application/pdf" 
            class="pdf-container"
            width="100%" 
            height="100%">
        
        <!-- Optional: Download button (in case someone wants the file) -->
        <a href="resume.pdf" download="Swarali_Resume.pdf" class="download-btn">
            Download PDF
        </a>
    </div>
</body>
</html>
