<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .pdf-viewer {
            width: 100%;
            height: calc(100vh - 120px);
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
        }
        @media (max-width: 768px) {
            .pdf-viewer {
                height: calc(100vh - 100px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Resume</h1>
        <embed src="resume.pdf" type="application/pdf" class="pdf-viewer">
    </div>
</body>
</html>
